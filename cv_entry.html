<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review – CandidateVoice.org</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; background: #f5f6fa; font-family: 'Inter', Arial, sans-serif; color: #1a1a2e; }

    header {
      position: sticky; top: 0; width: 100%;
      background: #ffffff; border-bottom: 2px solid #e8eaf0;
      z-index: 100; padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-text { font-size: 1.25rem; font-weight: 700; color: #1a1a2e; letter-spacing: -0.5px; }
    .logo-text span { color: #4f46e5; }

    .nav-link {
      font-size: 0.8rem; font-weight: 600; color: #4f46e5;
      text-decoration: none; padding: 7px 16px;
      border: 1.5px solid #c4b5fd; border-radius: 20px; transition: all 0.2s;
    }
    .nav-link:hover { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    .nav-link.primary { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    .nav-link.primary:hover { background: #4338ca; border-color: #4338ca; }

    .header-nav { display: flex; gap: 10px; }

    .content {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 80px;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.82rem; font-weight: 600; color: #4f46e5;
      text-decoration: none; margin-bottom: 24px;
      transition: gap 0.2s;
    }
    .back-link:hover { gap: 10px; }

    .entry-card {
      background: #ffffff;
      border: 1.5px solid #e8eaf0;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .entry-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #f3f4f6;
    }

    .entry-favicon {
      width: 48px; height: 48px;
      border-radius: 10px;
      flex-shrink: 0;
      border: 1px solid #e8eaf0;
    }

    .entry-header-text { flex: 1; }

    .entry-employer {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .entry-website {
      font-size: 0.8rem;
      color: #9ca3af;
      text-decoration: none;
    }
    .entry-website:hover { color: #4f46e5; }

    .entry-position {
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
    }

    .score-block {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding: 16px 20px;
      border-radius: 10px;
      background: #f9fafb;
      border: 1px solid #e8eaf0;
    }

    .score-label { font-size: 0.8rem; font-weight: 600; color: #6b7280; }

    .score-badge {
      font-size: 0.82rem; font-weight: 700;
      padding: 5px 14px; border-radius: 20px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .score-poor      { background: #fee2e2; color: #dc2626; }
    .score-fair      { background: #fef3c7; color: #d97706; }
    .score-good      { background: #d1fae5; color: #059669; }
    .score-excellent { background: #ede9fe; color: #7c3aed; }
    .score-none      { background: #f3f4f6; color: #9ca3af; }

    .score-pct {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-left: auto;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .field-item {
      background: #f9fafb;
      border: 1px solid #e8eaf0;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .field-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .field-value {
      font-size: 0.88rem;
      font-weight: 500;
      color: #1a1a2e;
    }

    .field-value.positive { color: #059669; }
    .field-value.negative { color: #dc2626; }
    .field-value.neutral  { color: #6b7280; }

    .meta-tag {
      display: inline-block;
      font-size: 0.78rem; font-weight: 500;
      padding: 4px 12px; border-radius: 20px;
    }
    .tag-ghosted    { background: #fee2e2; color: #dc2626; }
    .tag-rejection  { background: #dcfce7; color: #16a34a; }
    .tag-interview  { background: #fef9c3; color: #ca8a04; }
    .tag-hired      { background: #d1fae5; color: #059669; }

    .review-section { margin-bottom: 20px; }

    .review-section h3 {
      font-size: 0.78rem;
      font-weight: 700;
      color: #9ca3af;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .review-section p {
      font-size: 0.92rem;
      color: #374151;
      line-height: 1.75;
    }

    .review-best  { border-left: 3px solid #10b981; padding-left: 14px; }
    .review-worst { border-left: 3px solid #ef4444; padding-left: 14px; }

    .entry-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 20px;
      border-top: 1px solid #f3f4f6;
      margin-top: 20px;
    }

    .upvote-btn {
      display: flex; align-items: center; gap: 8px;
      background: #f9fafb; border: 1.5px solid #e5e7eb;
      color: #6b7280; font-family: 'Inter', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      padding: 8px 18px; border-radius: 20px;
      cursor: pointer; transition: all 0.2s;
    }
    .upvote-btn:hover { border-color: #4f46e5; color: #4f46e5; }
    .upvote-btn.voted { background: #ede9fe; border-color: #7c3aed; color: #7c3aed; }

    .company-link {
      font-size: 0.82rem; font-weight: 600;
      color: #4f46e5; text-decoration: none;
    }
    .company-link:hover { text-decoration: underline; }

    .state-msg {
      text-align: center; padding: 80px 20px;
      color: #9ca3af; font-size: 0.9rem;
    }

    footer {
      text-align: center; padding: 24px;
      font-size: 0.75rem; color: #9ca3af;
      border-top: 1px solid #e8eaf0; background: #ffffff;
    }
    footer a { color: #4f46e5; text-decoration: none; }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .content { padding: 24px 16px 60px; }
      .entry-card { padding: 20px; }
      .fields-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo-wrap">
    <div class="logo-text">Candidate<span>Voice</span>.org</div>
  </a>
  <nav class="header-nav">
    <a href="index.html" class="nav-link">← All Reviews</a>
    <a href="submit.html" class="nav-link primary">+ Share Your Experience</a>
  </nav>
</header>

<div class="content">
  <a href="index.html" class="back-link">← Back to all reviews</a>
  <div id="entry-container">
    <div class="state-msg">Loading review...</div>
  </div>
</div>

<footer>
  &copy; 2025 CandidateVoice.org &nbsp;|&nbsp;
  <a href="about.html">About</a> &nbsp;|&nbsp;
  <a href="terms.html">Community Guidelines</a>
</footer>

<script>
  const SUPABASE_URL = "https://lawteswyjpkovzagnshn.supabase.co";
  const SUPABASE_KEY = "sb_publishable_piPBYVy1yGEj_Iv0RCLtnA_PGzdT1bz";

  const params = new URLSearchParams(window.location.search);
  const id     = params.get("id");

  function scoreBadge(band, score) {
    if (!band) return `<span class="score-badge score-none">Not Scored</span>`;
    const labels = { poor: "🔴 Poor", fair: "🟡 Fair", good: "🟢 Good", excellent: "⭐ Excellent" };
    return `<span class="score-badge score-${band}">${labels[band]}</span>`;
  }

  function statusTag(status) {
    const map = {
      ghosted:          `<span class="meta-tag tag-ghosted">👻 Ghosted</span>`,
      formal_rejection: `<span class="meta-tag tag-rejection">✉️ Formal Rejection</span>`,
      interviewing:     `<span class="meta-tag tag-interview">🤝 Interviewing</span>`,
      got_the_job:      `<span class="meta-tag tag-hired">🎉 Got the Job</span>`
    };
    return map[status] || "";
  }

  function fieldVal(val, positiveVals, negativeVals) {
    if (!val || val === "dont_remember") return `<span class="field-value neutral">${val === "dont_remember" ? "Don't remember" : "—"}</span>`;
    const cls = positiveVals?.includes(val) ? "positive" : negativeVals?.includes(val) ? "negative" : "";
    const labels = {
      yes: "Yes", no: "No", optional: "Optional",
      after_applying: "After applying",
      after_interview_invite: "After interview invite",
      after_interviewing: "After interviewing",
      after_offer: "After offer"
    };
    return `<span class="field-value ${cls}">${labels[val] || val}</span>`;
  }

  function fmtDate(d) {
    if (!d) return "—";
    return new Date(d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  async function loadEntry() {
    if (!id) {
      document.getElementById("entry-container").innerHTML =
        `<div class="state-msg">No review ID provided. <a href="index.html">Go back</a></div>`;
      return;
    }

    try {
      const res    = await fetch(`${SUPABASE_URL}/rest/v1/reviews?id=eq.${id}&status=eq.approved`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      const data   = await res.json();
      const r      = data[0];

      if (!r) {
        document.getElementById("entry-container").innerHTML =
          `<div class="state-msg">Review not found. <a href="index.html">Go back</a></div>`;
        return;
      }

      document.title = `${r.employer_name} – CandidateVoice.org`;

      const favicon = r.employer_website
        ? `<img class="entry-favicon" src="https://www.google.com/s2/favicons?domain=${r.employer_website}&sz=128" onerror="this.style.display='none'" />`
        : "";

      const scoreSection = `
        <div class="score-block">
          <div>
            <div class="score-label">Candidate Experience Score</div>
            <div style="margin-top:6px;">${scoreBadge(r.score_band, r.experience_score)}</div>
          </div>
          ${r.experience_score ? `<div class="score-pct">${Math.round(r.experience_score)}%</div>` : ""}
        </div>`;

      const reviewSection = r.review_general ? `
        <div class="review-section">
          <h3>Review</h3>
          <p>${r.review_general}</p>
        </div>` : "";

      const bestSection = r.review_best ? `
        <div class="review-section review-best">
          <h3>Best Part</h3>
          <p>${r.review_best}</p>
        </div>` : "";

      const worstSection = r.review_worst ? `
        <div class="review-section review-worst">
          <h3>Worst Part</h3>
          <p>${r.review_worst}</p>
        </div>` : "";

      const whenGhosted = r.when_ghosted ? `
        <div class="field-item">
          <div class="field-label">When Ghosted</div>
          ${fieldVal(r.when_ghosted)}
        </div>` : "";

      document.getElementById("entry-container").innerHTML = `
        <div class="entry-card">
          <div class="entry-header">
            ${favicon}
            <div class="entry-header-text">
              <div class="entry-employer">${r.employer_name}</div>
              ${r.employer_website ? `<a href="${r.employer_website}" target="_blank" class="entry-website">${r.employer_website.replace(/https?:\/\//,'')}</a>` : ""}
            </div>
            <div>${statusTag(r.ghosted_status)}</div>
          </div>

          ${r.position_applied ? `<div class="entry-position">${r.position_applied}</div>` : ""}

          ${scoreSection}

          <div class="fields-grid">
            <div class="field-item">
              <div class="field-label">Date Applied</div>
              <div class="field-value">${fmtDate(r.date_applied)}</div>
            </div>
            <div class="field-item">
              <div class="field-label">Date Rejected</div>
              <div class="field-value">${fmtDate(r.date_rejected)}</div>
            </div>
            ${whenGhosted}
            <div class="field-item">
              <div class="field-label">Salary Disclosed</div>
              ${fieldVal(r.salary_disclosed, ['yes'], ['no'])}
            </div>
            <div class="field-item">
              <div class="field-label">Cover Letter Required</div>
              ${fieldVal(r.cover_letter_required, ['no','optional'], ['yes'])}
            </div>
            <div class="field-item">
              <div class="field-label">Take-Home Assignment</div>
              ${fieldVal(r.take_home_assignment, ['no'], ['yes'])}
            </div>
            <div class="field-item">
              <div class="field-label">Essay Responses</div>
              ${fieldVal(r.essay_responses, ['no'], ['yes'])}
            </div>
            <div class="field-item">
              <div class="field-label">Resume Re-entry</div>
              ${fieldVal(r.resume_reentry, ['no'], ['yes'])}
            </div>
            <div class="field-item">
              <div class="field-label">Interview Invite</div>
              ${fieldVal(r.interview_invite, ['yes'], ['no'])}
            </div>
          </div>

          ${reviewSection}
          ${bestSection}
          ${worstSection}

          <div class="entry-footer">
            <button class="upvote-btn" id="upvote-btn" onclick="upvote(${r.id}, ${r.upvotes})">
              👍 <span id="upvote-count">${r.upvotes > 0 ? r.upvotes : ""}</span> Helpful
            </button>
            <a href="company.html?name=${encodeURIComponent(r.employer_name)}" class="company-link">
              All reviews for ${r.employer_name} →
            </a>
          </div>
        </div>`;

    } catch(e) {
      document.getElementById("entry-container").innerHTML =
        `<div class="state-msg">Could not load review. <a href="index.html">Go back</a></div>`;
      console.error(e);
    }
  }

  async function upvote(id, current) {
    const btn = document.getElementById("upvote-btn");
    const voted = localStorage.getItem(`voted_${id}`);
    if (voted) { btn.classList.add("voted"); return; }

    try {
      await fetch(`${SUPABASE_URL}/rest/v1/reviews?id=eq.${id}`, {
        method: "PATCH",
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          Prefer: "return=minimal"
        },
        body: JSON.stringify({ upvotes: current + 1 })
      });
      document.getElementById("upvote-count").textContent = current + 1;
      localStorage.setItem(`voted_${id}`, "1");
      btn.classList.add("voted");
    } catch(e) { console.error(e); }
  }

  loadEntry();
</script>
</body>
</html>
